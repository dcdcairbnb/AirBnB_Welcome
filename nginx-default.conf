server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index welcome_sign.html;

    # Proxy guest authorization requests to the Omada auth bridge
    location /authorize {
        proxy_pass http://127.0.0.1:5000/authorize;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /welcome_sign.html;
    }
}
