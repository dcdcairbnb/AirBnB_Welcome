server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index welcome_sign.html;

    # Proxy guest authorization requests to the Omada auth bridge
    location /authorize {
        proxy_pass http://127.0.0.1:5000/authorize;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy email verification clicks (avoids Google multi-account redirect issue)
    location /verify {
        proxy_pass http://127.0.0.1:5000/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy Ticketmaster-backed events JSON
    location /events {
        proxy_pass http://127.0.0.1:5000/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    # Proxy live reservation lookup from Airbnb iCal
    location /reservation {
        proxy_pass http://127.0.0.1:5000/reservation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ /welcome_sign.html;
    }
}
